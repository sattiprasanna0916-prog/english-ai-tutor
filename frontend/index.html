<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpeakSmart • Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="responsive.css">
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="dark">

  <!-- NAVBAR -->
  <header class="topbar glass">
    <div class="brand">
      <div class="logo">SS</div>
      <div>
        <div class="brandTitle">SpeakSmart</div>
        <div class="brandSub">AI Interview Coach</div>
      </div>
    </div>

    <nav class="navRight">
      <a href="home.html" class="btn ghost">Home</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="auth-container">

    <div class="auth-card glass">

      <!-- HEADER -->
      <div class="auth-header">
        <h1>Welcome 👋</h1>
        <p>Start practicing interviews with AI feedback</p>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="tab active" onclick="switchTab('register')">Register</button>
        <button class="tab" onclick="switchTab('login')">Login</button>
      </div>

      <!-- REGISTER -->
      <div id="registerForm" class="auth-form active">

        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required/>

        <label>Branch</label>
        <input type="text" id="regBranch" placeholder="CSE / IT" required/>

        <button id="registerBtn" class="btn primary full glow" onclick="handleRegister()">
          Create Account →
        </button>

      </div>

      <!-- LOGIN -->
      <div id="loginForm" class="auth-form">

        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required/>

        <button id="loginBtn" class="btn full glow" onclick="handleLogin()">
          Continue →
        </button>

      </div>

    </div>

  </main>

  <!-- SCRIPT -->
  <script>
    // 🔐 Auto-redirect if already logged in
    window.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem("token");
      if (token) {
        window.location.href = "home.html";
      }
    });

    function switchTab(type){
      document.getElementById("registerForm").classList.remove("active");
      document.getElementById("loginForm").classList.remove("active");

      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

      if(type === "register"){
        document.getElementById("registerForm").classList.add("active");
        document.querySelectorAll(".tab")[0].classList.add("active");
      } else {
        document.getElementById("loginForm").classList.add("active");
        document.querySelectorAll(".tab")[1].classList.add("active");
      }
    }

    async function handleRegister(){
      const email = document.getElementById("regEmail").value.trim();
      const branch = document.getElementById("regBranch").value.trim();
      const btn = document.getElementById("registerBtn");

      if(!email || !branch){
        alert("Please fill all fields");
        return;
      }

      btn.innerText = "Creating...";
      btn.disabled = true;

      try {
        await registerUser(email, branch); // uses fixed app.js
      } catch (err) {
        alert("Registration failed");
      }

      btn.innerText = "Create Account →";
      btn.disabled = false;
    }

    async function handleLogin(){
      const email = document.getElementById("loginEmail").value.trim();
      const btn = document.getElementById("loginBtn");

      if(!email){
        alert("Please enter email");
        return;
      }

      btn.innerText = "Logging in...";
      btn.disabled = true;

      try {
        await loginUser(email); // uses fixed app.js
      } catch (err) {
        alert("Login failed");
      }

      btn.innerText = "Continue →";
      btn.disabled = false;
    }
  </script>

  <script src="app.js"></script>

</body>
</html>
